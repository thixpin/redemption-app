name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; the build job adds id-token for OIDC.
permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: redemption/redemption-api

jobs:
  # Test: run the suite against a real PostgreSQL (matches how the app runs).
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: redemption
          POSTGRES_PASSWORD: redemption
          POSTGRES_DB: redemption_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redemption"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://redemption:redemption@localhost:5432/redemption_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # Build, scan, and push the image to ECR. Runs only on main, after tests pass.
  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE" .

      - name: Run Trivy vulnerability scanner — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          vuln-type: 'os,library'
          ignore-unfixed: true

      - name: Push image
        run: docker push "$IMAGE"
