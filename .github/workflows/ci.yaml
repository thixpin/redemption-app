name: CI

# PR validation only — deployments live in deploy-dev.yaml (develop branch)
# and deploy-prod.yaml (v* tags on main).
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # Run the suite against a real PostgreSQL (matches how the app runs).
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: redemption
          POSTGRES_PASSWORD: redemption
          POSTGRES_DB: redemption_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redemption"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://redemption:redemption@localhost:5432/redemption_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
