name: Deploy Prod

# PROD release: push a v* tag on main to test, build the tagged commit as a
# multi-arch image, scan it, push it to the PROD account's ECR, and bump the
# prod overlay in redemption-infra (the prod cluster's Argo CD syncs it).
#
#   git tag v1.0.0 <main-commit-sha> && git push --tags
#
# Builds from the tag itself (rather than copying the dev image) because dev
# images are built from `develop` SHAs — a merge commit on main has no
# prebuilt image to promote.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: redemption/redemption-api
  PROD_ACCOUNT_ID: "770385967466"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: redemption
          POSTGRES_PASSWORD: redemption
          POSTGRES_DB: redemption_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redemption"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://redemption:redemption@localhost:5432/redemption_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to prod ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.PROD_ACCOUNT_ID }}

      - name: Set image ref
        run: echo "IMAGE=${PROD_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Build amd64 locally first so Trivy can scan it before anything is pushed.
      - name: Build (amd64) for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner — fail on CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          vuln-type: "os,library"
          ignore-unfixed: true

      - name: Build and push (amd64 + arm64) to prod ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps deploy: bump the prod overlay; the prod Argo CD rolls it out.
      - name: Check out infra repo
        uses: actions/checkout@v4
        with:
          repository: thixpin/redemption-infra
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump prod overlay image tag
        working-directory: infra/k8s/app/overlays/prod
        env:
          # Match on the BASE image name — the overlay rewrites it to the prod
          # account's registry via newName.
          IMAGE_NAME: 801100257021.dkr.ecr.ap-southeast-1.amazonaws.com/redemption/redemption-api
        run: |
          export TAG="${GITHUB_SHA::12}"
          yq -i '(.images[] | select(.name == strenv(IMAGE_NAME)) | .newTag) = strenv(TAG)' kustomization.yaml
          cat kustomization.yaml

      - name: Commit and push prod bump
        working-directory: infra
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/app/overlays/prod/kustomization.yaml
          git commit -m "deploy(prod): redemption-api ${GITHUB_SHA::12} (${GITHUB_REF_NAME})" \
            || { echo "Image tag unchanged, nothing to deploy."; exit 0; }
          git push
